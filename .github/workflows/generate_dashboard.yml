name: Generate Dashboard

on:
  push:
    branches:
      - main
    paths:
      - "meal_log.csv"
      - "user_goals.csv"

  workflow_dispatch:
    inputs:
      recompute_from:
        description: >
          Optional: YYYY-MM-DD. Recompute all dashboard rows on or after
          this date. Use after editing user_goals.csv to apply new goals
          to historical dates. Leave blank for a normal incremental run.
        required: false
        default: ""

jobs:
  generate-dashboard:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect changed files
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files: $CHANGED"

          if echo "$CHANGED" | grep -q "user_goals.csv"; then
            echo "goals_changed=true" >> $GITHUB_OUTPUT

            PREV_DATES=$(git show HEAD~1:user_goals.csv \
              | tail -n +2 | cut -d',' -f3 | sort)
            ALL_DATES=$(tail -n +2 user_goals.csv \
              | cut -d',' -f3 | sort)
            NEW_DATE=$(comm -13 <(echo "$PREV_DATES") <(echo "$ALL_DATES") \
              | head -1)

            if [ -n "$NEW_DATE" ]; then
              echo "recompute_from=$NEW_DATE" >> $GITHUB_OUTPUT
              echo "New goal effective_date detected: $NEW_DATE"
            else
              echo "recompute_from=" >> $GITHUB_OUTPUT
              echo "No new effective_date found — running normal incremental"
            fi
          else
            echo "goals_changed=false" >> $GITHUB_OUTPUT
            echo "recompute_from=" >> $GITHUB_OUTPUT
          fi

      - name: Resolve recompute flag
        id: recompute
        run: |
          MANUAL="${{ github.event.inputs.recompute_from }}"
          AUTO="${{ steps.changed.outputs.recompute_from }}"

          if [ -n "$MANUAL" ]; then
            echo "date=$MANUAL" >> $GITHUB_OUTPUT
            echo "Using manual recompute-from: $MANUAL"
          elif [ -n "$AUTO" ]; then
            echo "date=$AUTO" >> $GITHUB_OUTPUT
            echo "Using auto-detected recompute-from: $AUTO"
          else
            echo "date=" >> $GITHUB_OUTPUT
            echo "No recompute-from — incremental run"
          fi

      - name: Run generate_dashboard.py
        run: |
          RECOMPUTE="${{ steps.recompute.outputs.date }}"
          if [ -n "$RECOMPUTE" ]; then
            python generate_dashboard.py \
              --meal-log     meal_log.csv \
              --food-library food_library.csv \
              --user-goals   user_goals.csv \
              --dashboard    Meal_Data_Dashboard.csv \
              --recompute-from "$RECOMPUTE"
          else
            python generate_dashboard.py \
              --meal-log     meal_log.csv \
              --food-library food_library.csv \
              --user-goals   user_goals.csv \
              --dashboard    Meal_Data_Dashboard.csv
          fi

      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Meal_Data_Dashboard.csv
          git diff --cached --quiet \
            && echo "No changes to commit — dashboard already up to date" \
            || git commit -m "chore: update Meal_Data_Dashboard [skip ci]"

      - name: Push changes
        run: git push


      - name: Push changes
        run: git push

      - name: Trigger Health Tracker consolidation
        if: success()
        env:
          DISPATCH_TOKEN: ${{ secrets.HEALTH_TRACKER_DISPATCH_TOKEN }}
          GH_USERNAME:    ${{ secrets.GH_USERNAME }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/$GH_USERNAME/Health-Tracker/dispatches \
            -d '{"event_type": "meal_updated"}' \
          | grep -q "204" && echo "Dispatch sent successfully." \
                          || echo "WARNING: Dispatch failed — scheduled fallback will run."
